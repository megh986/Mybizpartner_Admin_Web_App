<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FF6B35" />
  <meta name="description" content="MyBizPartner Admin Portal - Grow your business with intelligent outreach" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/image.png" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"
    rel="stylesheet" />

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Theme Configuration -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0A0F1D",
            "accent": "#FF6B35",
            "accent-hover": "#E5521C",
            "background-light": "#F8FAFC",
            "background-dark": "#060911",
            "border-subtle": "#E2E8F0",
            "text-secondary": "#64748b"
          },
          fontFamily: {
            "display": ["Inter", "Plus Jakarta Sans", "sans-serif"],
            "heading": ["Inter", "Bricolage Grotesque", "Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px",
            "subtle": "12px"
          },
          boxShadow: {
            "soft": "0 4px 15px rgba(255, 107, 53, 0.25)",
            "orange-glow": "0 6px 20px rgba(255, 107, 53, 0.35)"
          }
        },
      },
    }
  </script>

  <style>
    /* Custom overrides for specific design needs */
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-feature-settings: "cv11", "ss01";
      -webkit-font-smoothing: antialiased;
    }

    .font-heading {
      font-family: 'Inter', 'Bricolage Grotesque', sans-serif;
    }

    .btn-orange {
      background: linear-gradient(135deg, #FF6B35, #E5521C);
      color: #fff;
      transition: all 0.2s ease;
    }
    .btn-orange:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.35);
      transform: translateY(-1px);
    }
    .btn-orange:active:not(:disabled) {
      transform: scale(0.98);
    }
  </style>

  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  <title>MyBizPartner Admin Portal</title>
</head>

<body class="bg-[#F8FAFC] dark:bg-background-dark min-h-screen font-display text-primary transition-colors duration-300">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
</body>

</html>
