<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#081326" />
  <meta name="description" content="Word of Mouth - The trust infrastructure for businesses" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/image.png" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"
    rel="stylesheet" />

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Theme Configuration -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#081326",
            "background-light": "#f6f7f8",
            "background-dark": "#121720",
            "border-subtle": "#e2e8f0",
            "text-secondary": "#64748b"
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"],
            "heading": ["Bricolage Grotesque", "Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px",
            "subtle": "12px"
          },
          boxShadow: {
            "soft": "0 2px 10px rgba(8, 19, 38, 0.03)"
          }
        },
      },
    }
  </script>

  <style>
    /* Custom overrides for specific design needs */
    body {
      font-feature-settings: "cv11", "ss01";
      -webkit-font-smoothing: antialiased;
    }

    .font-heading {
      font-family: 'Bricolage Grotesque', sans-serif;
    }
  </style>

  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  <title>Word of Mouth</title>
</head>

<body class="bg-white dark:bg-background-dark min-h-screen font-display text-primary transition-colors duration-300">
